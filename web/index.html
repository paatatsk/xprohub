<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XProHub — Real Work. Fair Pay. For Everyone.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0E0E0F;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
    }
    h1 {
      color: #C9A84C;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .tagline {
      color: #C9A84C;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }
    .mission {
      color: #888890;
      font-size: 15px;
      line-height: 24px;
    }
    .divider {
      width: 40px;
      height: 2px;
      background: #C9A84C;
      margin: 24px auto;
      opacity: 0.4;
    }
    .status {
      color: #888890;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .contact {
      color: #C9A84C;
      font-size: 13px;
      letter-spacing: 1px;
      text-decoration: none;
      opacity: 0.7;
    }
    .contact:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>XPROHUB</h1>
    <p class="tagline">Real Work. Fair Pay. For Everyone.</p>
    <p class="mission">
      A marketplace for everyday work. Every user is both customer and worker. Economic empowerment for people who show up and do the work.
    </p>
    <div class="divider"></div>
    <p class="status">COMING SOON — NYC</p>
    <a class="contact" href="mailto:hello@xprohub.com">hello@xprohub.com</a>
  </div>
</body>
</html>
